<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Cuaca Sederhana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <div class="search">
            <input type="text" id="city-input" placeholder="Masukkan nama kota" value="Jakarta">
            <button id="search-btn">Cari</button>
        </div>
        
        <div class="weather-box" id="weather-box">
            <h2 id="city-name">Nama Kota</h2>
            <p id="weather-desc">Kondisi Cuaca</p>
            <div class="temp-container">
                <span id="temperature">0</span>°C
            </div>
            
            <div class="details">
                <div class="col">
                    <p>Kelembapan</p>
                    <p class="humidity" id="humidity">0%</p>
                </div>
            </div>
        </div>
        
        <div id="error-msg" class="error-msg" style="display: none;">
            Kota tidak ditemukan. Silakan coba lagi.
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
